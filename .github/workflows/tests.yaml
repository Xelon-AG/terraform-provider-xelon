name: Tests

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 #v6.5.0
        with:
          go-version-file: "go.mod"

      - name: Build provider
        run: make build

  unit-tests:
    name: unit tests
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 #v6.5.0
        with:
          go-version-file: "go.mod"

      - name: Fix permissions for cache directories
        run: |
          chmod -R 0755 ~/.cache/go-build ~/go/pkg/mod || true

      - name: Set up cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 #v6.1.0
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('go.sum', 'tools/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install tools
        run: make tools

      - name: Lint source code
        run: make lint

      - name: Run unit tests
        run: make test

  acceptance-tests:
    name: acceptance tests (terraform ${{ matrix.terraform-version }})
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: build
    timeout-minutes: 30
    env:
      XELON_BASE_URL: ${{ secrets.XELON_BASE_URL }}
      XELON_CLIENT_ID: ${{ secrets.XELON_CLIENT_ID }}
      XELON_TOKEN: ${{ secrets.XELON_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        terraform-version:
          - "1.14.*"
          - "1.15.*"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ matrix.terraform-version }}
          terraform_wrapper: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 #v6.5.0
        with:
          go-version-file: "go.mod"

      - name: Fix permissions for cache directories
        run: |
          chmod -R 0755 ~/.cache/go-build ~/go/pkg/mod || true

      - name: Set up cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 #v6.1.0
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('go.sum', 'tools/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install tools
        run: make tools

      - name: Run acceptance tests
        run: make testacc

  sweeper:
    name: sweeper cleanup
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'pull_request'
    needs: acceptance-tests
    timeout-minutes: 15
    env:
      XELON_BASE_URL: ${{ secrets.XELON_BASE_URL }}
      XELON_CLIENT_ID: ${{ secrets.XELON_CLIENT_ID }}
      XELON_TOKEN: ${{ secrets.XELON_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: "go.mod"

      - name: Fix permissions for cache directories
        run: |
          chmod -R 0755 ~/.cache/go-build ~/go/pkg/mod || true

      - name: Set up cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('go.sum', 'tools/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run sweeper cleanup
        run: make sweep

  docs:
    name: documentation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: "go.mod"

      - name: Fix permissions for cache directories
        run: |
          chmod -R 0755 ~/.cache/go-build ~/go/pkg/mod || true

      - name: Set up cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('go.sum', 'tools/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install tools
        run: make tools

      - name: Validate provider docs
        run: |
          make docs
          git diff --compact-summary --exit-code || \
            (echo; echo "Unexpected difference after code generation. Run 'make docs' and commit."; exit 1)
